# Samba configuration excerpt for the Enterprise Linux Infrastructure Lab
# Validate after changes with: testparm

[global]
   workgroup = WORKGROUP
   server string = %h server (Samba, Ubuntu)
   server role = standalone server

   # Authentication and account integration
   obey pam restrictions = yes
   unix password sync = yes
   pam password change = yes
   map to guest = bad user

   # Logging
   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file

   # Legacy NetBIOS service is disabled
   disable netbios = yes

[Shared]
   comment = Enterprise Shared Folder
   path = /srv/samba/shared
   browseable = yes
   writable = yes
   valid users = @itadmins

   # New files receive group read/write permissions.
   create mask = 0660

   # New directories inherit group ownership through setgid.
   directory mask = 2770
